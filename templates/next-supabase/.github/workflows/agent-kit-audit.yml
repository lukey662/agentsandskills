name: Agent Kit Audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Agent kit readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install agent-kit CLI
        run: npm install --no-save @appsforgood/next-supabase-kit@latest

      - name: Run baseline audit gate
        run: npx agent-kit audit --json --min-readiness baseline-setup
