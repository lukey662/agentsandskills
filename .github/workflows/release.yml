name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run all release checks without publishing."
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use declared npm version
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Release readiness check
        run: npm run release:check

      - name: Create package artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          npm pack --json --pack-destination release-artifacts > release-artifacts/npm-pack.json
          tarball="$(node -e "const [result] = JSON.parse(require('fs').readFileSync('release-artifacts/npm-pack.json', 'utf8')); if (!result?.filename) process.exit(1); console.log('release-artifacts/' + result.filename);")"
          echo "tarball=${tarball}" >> "${GITHUB_OUTPUT}"

      - name: Generate package SBOM
        run: node scripts/sbom-check.mjs --output release-artifacts/sbom.cdx.json

      - name: Upload release evidence
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-release-evidence
          path: |
            release-artifacts/*.tgz
            release-artifacts/sbom.cdx.json
            release-artifacts/npm-pack.json
          retention-days: 30

      - name: Validate trusted publishing context
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        run: |
          test -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}"
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}"

      - name: Validate manual publish ref
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false'
        run: test "${GITHUB_REF}" = "refs/heads/main"

      - name: Attest package SBOM
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        uses: actions/attest-sbom@v3
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
          sbom-path: release-artifacts/sbom.cdx.json

      - name: Publish to public npm
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        run: |
          set -euo pipefail
          tarball="./${{ steps.pack.outputs.tarball }}"
          # setup-node may write an empty auth line when registry-url is set; scrub so npm uses OIDC only.
          npm config delete //registry.npmjs.org/:_authToken --location=user 2>/dev/null || true
          npm config delete //registry.npmjs.org/:_authToken --location=project 2>/dev/null || true
          unset NODE_AUTH_TOKEN NPM_TOKEN NPM_CONFIG_USERCONFIG
          npm publish "${tarball}" --access public

      - name: Verify published package install
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        run: node scripts/post-publish-verify.mjs
