name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run all release checks without publishing."
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use declared npm version
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Package dry run
        run: npm pack --dry-run

      - name: Validate trusted publishing context
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        run: |
          test -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}"
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}"

      - name: Publish to private npm
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        run: npm publish --access restricted

      - name: Verify published package install
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_READ_TOKEN is not configured; skipping private install verification."
            exit 0
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          for attempt in 1 2 3 4 5; do
            npm view "@afg/next-supabase-agent-kit@$PACKAGE_VERSION" version --registry=https://registry.npmjs.org && break
            sleep 10
          done
          npx --yes "@afg/next-supabase-agent-kit@$PACKAGE_VERSION" doctor
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_READ_TOKEN }}
